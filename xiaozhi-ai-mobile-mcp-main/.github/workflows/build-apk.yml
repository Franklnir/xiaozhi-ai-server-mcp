name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/scig-upload.keystore
            echo "Production keystore prepared."
          else
            echo "No production keystore secret configured; Gradle fallback signing will be used."
          fi

      - name: Resolve Version
        id: vars
        shell: bash
        run: |
          APP_NAME="$(node -p "require('./mobile_release.json').appName || 'xiaozhiscig'")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        working-directory: android
        env:
          SCIG_UPLOAD_STORE_FILE: ${{ github.workspace }}/android/app/scig-upload.keystore
          SCIG_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIG_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIG_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Rename APK
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk build-output/${{ steps.vars.outputs.app_name }}-v${{ steps.vars.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.app_name }}-apk
          path: build-output/${{ steps.vars.outputs.app_name }}-v${{ steps.vars.outputs.version }}.apk
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/${{ steps.vars.outputs.app_name }}-v${{ steps.vars.outputs.version }}.apk
          name: "${{ steps.vars.outputs.app_name }} v${{ steps.vars.outputs.version }}"
          body: |
            Download APK Android terbaru untuk ${{ steps.vars.outputs.app_name }}.

            Fitur utama:
            - Login aman dengan akun yang sama
            - Kontrol mode dan persona Xiaozhi
            - Tracking data HP hanya lewat APK mobile
            - Backend sudah dibundel di aplikasi

            Minimum Android: 8.0+
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
