services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - python
      - -m
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
    env_file:
      - ./vps_api.env
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - scig_internal

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - python
      - worker.py
    env_file:
      - ./vps_worker.env
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - scig_internal

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.docker.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - scig_internal

volumes:
  caddy_data:
  caddy_config:

networks:
  scig_internal:
    driver: bridge
